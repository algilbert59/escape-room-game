<!DOCTYPE html>
<html>
<head>
    <title>Bilirubin Nomogram Reference</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .nomogram { display: flex; justify-content: center; margin: 20px; }
        .zone { width: 100px; height: 100px; margin: 5px; text-align: center; }
        .risk-zone { border: 2px solid red; }
    </style>
</head>
<body>
    <h1>Bilirubin Nomogram Reference</h1>
    <p>This interactive nomogram provides clinical reference tables for neonatal bilirubin assessment.</p>
    <div class="nomogram">
        <div class="zone risk-zone">Risk Zone 1</div>
        <div class="zone risk-zone">Risk Zone 2</div>
        <div class="zone">Clinical Reference</div>
    </div>
    <table>
        <tr>
            <th>Age (Hours)</th>
            <th>Bilirubin Level (mg/dL)</th>
        </tr>
        <tr>
            <td>0-24</td>
            <td>5</td>
        </tr>
        <tr>
            <td>25-48</td>
            <td>10</td>
        </tr>
        <tr>
            <td>49-72</td>
            <td>15</td>
        </tr>
    </table>
    <script>
        // Interactive functionality can be added here
    </script>
</body>
</html>
