<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Game</title>
    <script>
        let timers = {};

        function startTimer(room) {
            let timeLeft = 60; // 60 seconds for each room
            timers[room] = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timers[room]);
                    alert('Time is up for ' + room); // or handle time up
                } else {
                    document.getElementById(room + '-timer').innerHTML = timeLeft + ' seconds remaining';
                    timeLeft--;
                }
            }, 1000);
        }

        function toggleHint(room) {
            const hint = document.getElementById(room + '-hint');
            if (hint.style.display === 'none' || hint.style.display === '') {
                hint.style.display = 'block';
            } else {
                hint.style.display = 'none';
            }
        }

        function submitAnswer(room, correctAnswer) {
            const userAnswer = document.getElementById(room + '-answer').value;
            if (userAnswer === correctAnswer) {
                alert('Correct answer!');
            } else {
                alert('Try again.');
            }
        }
    </script>
</head>
<body>
    <h1>Escape Room Game</h1>

    <div id="room1">
        <h2>Room 1</h2>
        <div id="room1-timer">60 seconds remaining</div>
        <button onclick="startTimer('room1')">Start Timer</button>
        <button onclick="toggleHint('room1')">Hint</button>
        <div id="room1-hint" style="display:none;">Hint for Room 1</div>
        <input type="text" id="room1-answer" placeholder="Your answer">
        <button onclick="submitAnswer('room1', 'correctAnswer1')">Submit</button>
    </div>

    <div id="room2">
        <h2>Room 2</h2>
        <div id="room2-timer">60 seconds remaining</div>
        <button onclick="startTimer('room2')">Start Timer</button>
        <button onclick="toggleHint('room2')">Hint</button>
        <div id="room2-hint" style="display:none;">Hint for Room 2</div>
        <input type="text" id="room2-answer" placeholder="Your answer">
        <button onclick="submitAnswer('room2', 'correctAnswer2')">Submit</button>
    </div>

    <div id="room3">
        <h2>Room 3</h2>
        <div id="room3-timer">60 seconds remaining</div>
        <button onclick="startTimer('room3')">Start Timer</button>
        <button onclick="toggleHint('room3')">Hint</button>
        <div id="room3-hint" style="display:none;">Hint for Room 3</div>
        <input type="text" id="room3-answer" placeholder="Your answer">
        <button onclick="submitAnswer('room3', 'correctAnswer3')">Submit</button>
    </div>
</body>
</html>
